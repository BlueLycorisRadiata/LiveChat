services:
  - type: web
    name: livechat-backend
    docker:
      dockerfile: Dockerfile
      context: .
    envVars:
      - key: PORT
        value: "8080"
      - key: DB_SOURCE
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: OPENROUTER_API_KEY
        sync: false
    healthCheck:
      path: /health
      interval: 30
      timeout: 10
      retries: 3
      startupDelay: 15

services:
  - type: web
    name: livechat-backend
    env: go
    buildCommand: go build -o livechat ./cmd/main.go
    startCommand: ./livechat
    envVars:
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "http://localhost:5173"
    disk:
      mountPath: /app
      readOnly: false
      sizeGB: 1

databases:
  - name: livechat-db
    type: postgresql
    plan: free
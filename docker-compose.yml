version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres15
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: go-chat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-chat-backend
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_SOURCE: postgresql://root:password@postgres:5432/go-chat?sslmode=disable

volumes:
  postgres_data: